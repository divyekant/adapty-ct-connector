services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs
      - DEFAULT_REGION=us-east-1
      - LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT=1
    volumes:
      - "./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init.sh"

  mock-clevertap:
    build:
      context: .
      dockerfile: Dockerfile.mock
    ports:
      - "8089:8080"

  connector:
    build:
      context: .
    depends_on:
      - localstack
      - mock-clevertap
    environment:
      - CT_ACCOUNT_ID=test-account
      - CT_PASSCODE=test-passcode
      - CT_REGION=us1
      - CT_BASE_URL=http://mock-clevertap:8080/1/upload
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/adapty-ct-test
      - SQS_ENDPOINT=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - LOG_LEVEL=debug
      - BATCH_SIZE=10
